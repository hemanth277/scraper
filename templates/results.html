<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | {{ query }}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #764ba2;
            --premium-bg: #fdfdfd;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--premium-bg);
            color: #2d3436;
        }
        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .results-header {
            padding: 2.5rem 0;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            margin-bottom: 2rem;
        }
        .summary-box {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2.5rem;
            border-left: 6px solid #764ba2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #f0f0f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.06);
            border-color: #dee2e6;
        }
        .result-title {
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-decoration: none;
            font-size: 1.25rem;
            display: inline-block;
        }
        .result-title:hover {
            color: #667eea;
        }
        .result-link {
            color: #00b894;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-decoration: none;
        }
        .result-snippet {
            color: #636e72;
            line-height: 1.6;
        }
        .btn-premium {
            background: var(--primary-gradient);
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 2rem;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.2);
        }
        .btn-premium:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(118, 75, 162, 0.3);
            color: white;
        }
        .btn-outline-premium {
            border: 2px solid #764ba2;
            color: #764ba2;
            border-radius: 0.75rem;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-outline-premium:hover {
            background: #764ba2;
            color: white;
        }
        .badge-ai {
            background: var(--primary-gradient);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            color: white;
            margin-bottom: 1rem;
            display: inline-block;
        }
    </style>
</head>
<body>

    <nav class="navbar mb-0">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-3" href="/" style="background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">🔍 Smart Scraper</a>
            <div class="d-flex gap-2">
                <a href="/download" class="btn btn-premium">⬇ Export to Excel</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Search Results: <span class="text-primary">{{ query }}</span></h2>
            <a href="/" class="btn btn-outline-premium">New Search</a>
        </div>

        <!-- ✅ SEARCH RESULTS LIST (DIRECT DATA ONLY) -->
        {% if results %}
            {% for item in results %}
            <div class="result-card">
                <a href="{{ item['Link'] }}" target="_blank" class="result-title">{{ item['Title'] }}</a>
                <a href="{{ item['Link'] }}" target="_blank" class="result-link">{{ item['Link'] }}</a>
                
                <div class="mt-3 p-3" style="background: #f8f9fa; border-radius: 1rem; border-left: 4px solid #764ba2; font-size: 1.05rem; line-height: 1.8; color: #333;">
                    {{ item['ExtractedContent'] }}
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="text-center py-5">
                <h3 class="text-muted">No results found 😕</h3>
                <p>Try broadening your query for more info.</p>
                <a href="/" class="btn btn-premium mt-3">Try Again</a>
            </div>
        {% endif %}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
