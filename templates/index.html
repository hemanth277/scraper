<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Search | Premium Engine</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 0% 0%, #667eea15 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, #764ba215 0%, transparent 50%);
        }
        .search-container {
            max-width: 800px;
            width: 100%;
            padding: 3rem;
            background: var(--glass-bg);
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }
        .search-container:hover {
            transform: translateY(-5px);
        }
        h1 {
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }
        .form-control {
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            border: 2px solid #eee;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.1);
            border-color: #764ba2;
        }
        .btn-search {
            background: var(--primary-gradient);
            border: none;
            border-radius: 1rem;
            padding: 1rem 2.5rem;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
        }
        .btn-search:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(118, 75, 162, 0.3);
            color: white;
        }
        .error-msg {
            color: #ff7675;
            margin-bottom: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="search-container text-center">
        <h1>🔍 <span class="text-transparent bg-clip-text" style="background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Smart Search</span> Engine</h1>
        
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" class="d-flex flex-column flex-md-row gap-2">
            <input type="text" name="query" class="form-control flex-grow-1" placeholder="What are you looking for today?" required autocomplete="off">
            <button class="btn btn-search">Search Now</button>
        </form>
    </div>

</body>
</html>
