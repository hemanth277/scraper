<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Chatbot | Direct Answers</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bot-bg: #f0f2f5;
            --user-bg: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: #f8f9fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            margin-bottom: 1.5rem;
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 1.5rem;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bot-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .user-message {
            background: var(--primary-gradient);
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 0.2rem;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
        }
        .input-area {
            background: white;
            padding: 1.5rem;
            border-top: 1px solid #eee;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.02);
        }
        .input-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
        }
        .form-control {
            border-radius: 1rem;
            padding: 0.8rem 1.5rem;
            border: 2px solid #f0f0f0;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #764ba2;
            box-shadow: none;
        }
        .btn-send {
            background: var(--primary-gradient);
            border: none;
            border-radius: 1rem;
            padding: 0.5rem 2rem;
            color: white;
            font-weight: 600;
        }
        .source-tag {
            font-size: 0.75rem;
            color: #764ba2;
            background: #f0f2f5;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            text-decoration: none;
            margin-right: 0.5rem;
            display: inline-block;
            margin-top: 0.5rem;
        }
        .typing {
            font-style: italic;
            color: #999;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <nav class="navbar bg-white shadow-sm">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold" style="background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">🔍 Smart AI Chatbot</span>
            <a href="/download" class="btn btn-sm btn-outline-secondary">Download Results</a>
        </div>
    </nav>

    <div class="chat-container d-flex flex-column" id="chatWindow">
        <div class="message bot-message">
            Hello! I'm your Smart AI Assistant. Ask me anything, and I'll give you a direct answer based on web search.
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <div id="typingIndicator" class="typing mb-2 w-100">AI is searching for direct answer...</div>
            <input type="text" id="userInput" class="form-control" placeholder="Ask your question here..." autocomplete="off">
            <button class="btn btn-send" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query) return;

            // Add user message to UI
            addMessage(query, 'user');
            userInput.value = '';
            
            // Show typing indicator
            typingIndicator.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                
                const data = await response.json();
                
                // Hide typing indicator
                typingIndicator.style.display = 'none';

                if (data.error) {
                    addMessage("Sorry, I couldn't process that query.", 'bot');
                } else {
                    addMessage(data.answer, 'bot');
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessage("An error occurred while connecting to the server.", 'bot');
            }
        }

        function addMessage(content, sender, isHtml = false) {
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            if (isHtml) {
                div.innerHTML = content;
            } else {
                div.textContent = content;
            }
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Handle Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
